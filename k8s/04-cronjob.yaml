apiVersion: batch/v1
kind: CronJob
metadata:
  name: youtube-bot
  namespace: youtube-bot
spec:
  # Roda de 30 em 30 minuto
  schedule: "*/30 * * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          # --- Forcar DNS Para evitar erro de rede
          dnsPolicy: "None"
          dnsConfig:
            nameservers:
              - 8.8.8.8
              - 1.1.1.1
          restartPolicy: OnFailure
          containers:
            - name: youtube-bot
              # Substitua "usuario/sua_imagem" pelo nome real no seu repo de imagens
              image: brunosysops/youtube-bot-auto:v1
              imagePullPolicy: Always
              command: ["sh", "-c", "mkdir -p /app/data && [ ! -s /app/data/comment_history.json ] && echo '{}' > /app/data/comment_history.json; ln -sf /app/data/comment_history.json /app/comment_history.json && ./run_bot.sh"]
              #command: ["sh", "-c", "ln -sf /app/data/comment_history.json /app/comment_history.json && ./run_bot.sh"]
              #command: ["python", "scripts/main_polling.py"]
              resources:
                requests:
                  memory: "70Mi"
                  cpu: "50m"
                limits:
                  memory: "200Mi"
                  cpu: "250m"
              env:
                # Força os logs do Python a não ficarem no buffer (aparecerem instantaneamente no kubectl logs)
                - name: PYTHONUNBUFFERED
                  value: "1"
              volumeMounts:
                - name: history-volume
                  mountPath: /app/data/
                - name: config-volume
                  mountPath: /app/config.json
                  subPath: config.json
                - name: secrets-volume
                  mountPath: /app/client_secret.json
                  subPath: client_secret.json
                - name: secrets-volume
                  mountPath: /app/tokens.json
                  subPath: tokens.json
          volumes:
            - name: history-volume
              persistentVolumeClaim:
                claimName: youtube-bot-history-pvc
            - name: config-volume
              configMap:
                name: youtube-bot-config
            - name: secrets-volume
              secret:
                secretName: youtube-bot-creds
                optional: false
